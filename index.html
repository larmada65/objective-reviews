<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objective Reviews</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="logo">OBJECTIVE REVIEWS</div>
  </div>
</header>

<div class="controls">
  <input
    type="text"
    id="searchInput"
    placeholder="Search band or album..."
  />

  <select id="genreFilter">
    <option value="all">All Genres</option>
  </select>

  <select id="sortBy">
    <option value="default">Sort By</option>
    <option value="year-desc">Newest First</option>
    <option value="year-asc">Oldest First</option>
    <option value="rating-desc">Highest Rated</option>
    <option value="rating-asc">Lowest Rated</option>
  </select>
</div>

<main class="container">
  <h1>Albums</h1>
  <div id="albumGrid" class="grid"></div>
</main>

<form id="createBandForm">
  <input type="text" id="bandName" placeholder="Band Name" required />
  <textarea id="bandBio" placeholder="Band Bio"></textarea>
  <input type="file" id="bandImage" accept="image/*" />
  <button type="submit">Create Band</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/main.js"></script>
</body>
</html>
